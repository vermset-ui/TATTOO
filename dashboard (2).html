<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>VERMESET — Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#080808;--surface:#111010;--card:#1a1717;--border:#2e2a2a;--hover:#222020;
  --mg:#ff1f7a;--hot:#ff4d9b;--pglow:rgba(232,24,106,.1);
  --txt:#f0ece8;--muted:#6e6a68;--dim:#3a3636;
  --green:#27ae60;--amber:#c9a84c;--red:#c0392b;--blue:#2980b9;
  --sb:220px;
}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--txt);font-family:'Barlow Condensed',sans-serif;min-height:100vh;overflow-x:hidden;}
button,input,select,textarea{font-family:inherit;}
a{text-decoration:none;color:inherit;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--dim);}

/* AUTH */
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse 70% 80% at 20% 50%,rgba(232,24,106,.08),transparent 60%),var(--bg);}
.auth-box{width:420px;max-width:95vw;padding:2.5rem;}
.auth-brand{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:.2em;color:var(--txt);text-align:center;}
.auth-brand b{color:var(--mg);}
.auth-label{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.3em;color:var(--muted);text-align:center;text-transform:uppercase;margin-top:.25rem;margin-bottom:2rem;}
.auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:1.8rem;}
.atab{flex:1;padding:.75rem;background:none;border:none;font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:color .25s;position:relative;}
.atab.on{color:var(--mg);}
.atab.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--mg);}
.apanel{display:none;}
.apanel.on{display:block;}
.fl{display:flex;flex-direction:column;gap:.35rem;margin-bottom:1rem;}
.fl label{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);}
.fl input{background:var(--card);border:1px solid var(--border);color:var(--txt);padding:.8rem 1rem;font-size:.95rem;outline:none;transition:border-color .25s;width:100%;}
.fl input:focus{border-color:var(--mg);}
.abtn{width:100%;background:var(--mg);color:var(--bg);border:none;padding:.9rem;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.3em;cursor:pointer;transition:background .25s;margin-top:.3rem;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));}
.abtn:hover{background:var(--hot);}
.ahint{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.1em;color:var(--dim);text-align:center;margin-top:.8rem;}
.ahint span{color:var(--muted);}
.asep{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;}
.asep::before,.asep::after{content:'';flex:1;height:1px;background:var(--border);}
.asep span{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--dim);}
.abtn-alt{width:100%;background:none;border:1px solid rgba(201,168,76,.3);color:var(--amber);padding:.7rem;font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .25s;}
.abtn-alt:hover{border-color:var(--amber);background:rgba(201,168,76,.05);}

/* APP */
#app{display:none;min-height:100vh;}
.shell{display:grid;grid-template-columns:var(--sb) 1fr;min-height:100vh;}

/* SIDEBAR */
.sb{position:fixed;top:0;left:0;width:var(--sb);height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;overflow-y:auto;}
.sb-brand{padding:1.4rem 1.2rem;border-bottom:1px solid var(--border);flex-shrink:0;}
.sb-name{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.18em;color:var(--txt);}
.sb-name b{color:var(--mg);}
.sb-role{font-family:'Space Mono',monospace;font-size:.50rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-top:.2rem;}
.sb-role.admin-role{color:var(--amber);}
.sb-nav{flex:1;padding:.8rem 0;}
.sb-section{font-family:'Space Mono',monospace;font-size:.48rem;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;padding:.6rem 1.2rem .25rem;}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.65rem 1.2rem;font-size:.93rem;color:var(--muted);cursor:pointer;transition:all .22s;border-left:2px solid transparent;}
.nav-item:hover{color:var(--txt);background:var(--pglow);}
.nav-item.on{color:var(--mg);border-left-color:var(--mg);background:var(--pglow);}
.nav-item svg{width:15px;height:15px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.8;}
.nav-badge{margin-left:auto;background:var(--mg);color:var(--bg);border-radius:10px;font-family:'Space Mono',monospace;font-size:.42rem;padding:.15rem .45rem;flex-shrink:0;}
.sb-user{padding:1rem 1.2rem;border-top:1px solid var(--border);flex-shrink:0;}
.sb-user-row{display:flex;align-items:center;gap:.7rem;margin-bottom:.7rem;}
.ava{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.85rem;flex-shrink:0;}
.ava-client{background:var(--mg);color:var(--bg);}
.ava-admin{background:var(--amber);color:var(--bg);}
.sb-uname{font-size:.9rem;font-weight:600;color:var(--txt);}
.sb-email{font-family:'Space Mono',monospace;font-size:.48rem;color:var(--muted);}
.btn-logout{width:100%;background:none;border:1px solid var(--border);color:var(--muted);padding:.45rem;font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .25s;}
.btn-logout:hover{color:var(--mg);border-color:var(--mg);}

/* MAIN */
.main{margin-left:var(--sb);padding:2rem;min-height:100vh;}
.ph{margin-bottom:1.8rem;}
.ph-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.08em;color:var(--txt);}
.ph-sub{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.18em;color:var(--muted);text-transform:uppercase;margin-top:.25rem;}
.ph-row{display:flex;justify-content:space-between;align-items:flex-start;}

/* STATS */
.stat-row{display:grid;gap:1rem;margin-bottom:1.8rem;}
.stat-row.cols4{grid-template-columns:repeat(4,1fr);}
.stat-row.cols3{grid-template-columns:repeat(3,1fr);}
.stat{background:var(--card);border:1px solid var(--border);padding:1.3rem 1.2rem;position:relative;overflow:hidden;transition:border-color .25s;}
.stat:hover{border-color:rgba(232,24,106,.3);}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--mg);transform:scaleX(0);transform-origin:left;transition:transform .3s;}
.stat:hover::before{transform:scaleX(1);}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--mg);letter-spacing:.04em;}
.stat-lbl{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-top:.2rem;}
.stat-trend{position:absolute;top:.9rem;right:.9rem;font-family:'Space Mono',monospace;font-size:.50rem;padding:.2rem .45rem;border-radius:3px;}
.stat-trend.up{color:#27ae60;background:rgba(39,174,96,.12);}
.stat-trend.warn{color:var(--amber);background:rgba(201,168,76,.12);}
.stat-trend.info{color:var(--blue);background:rgba(41,128,185,.12);}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);margin-bottom:1.2rem;}
.card-hd{display:flex;justify-content:space-between;align-items:center;padding:.9rem 1.2rem;border-bottom:1px solid var(--border);}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;color:var(--txt);}
.card-body{padding:1.2rem;}
.card-body.np{padding:0;}

/* TABLE */
.tbl{width:100%;border-collapse:collapse;}
.tbl th{font-family:'Space Mono',monospace;font-size:.50rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);padding:.65rem 1.1rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;}
.tbl td{font-size:.95rem;padding:.65rem 1.1rem;border-bottom:1px solid rgba(46,42,42,.6);color:var(--txt);vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:var(--pglow);}
.tbl-wrap{overflow-x:auto;}

/* TAGS */
.tag{display:inline-block;font-family:'Space Mono',monospace;font-size:.50rem;letter-spacing:.12em;padding:.22rem .55rem;text-transform:uppercase;border-radius:2px;}
.tag-green{background:rgba(39,174,96,.15);color:#27ae60;border:1px solid rgba(39,174,96,.25);}
.tag-amber{background:rgba(201,168,76,.15);color:var(--amber);border:1px solid rgba(201,168,76,.25);}
.tag-red{background:rgba(192,57,43,.15);color:#e74c3c;border:1px solid rgba(192,57,43,.25);}
.tag-blue{background:rgba(41,128,185,.15);color:#3498db;border:1px solid rgba(41,128,185,.25);}
.tag-grey{background:rgba(110,106,104,.1);color:var(--muted);border:1px solid var(--border);}
.tag-pink{background:rgba(232,24,106,.15);color:var(--hot);border:1px solid rgba(232,24,106,.25);}

/* BUTTONS */
.btn{font-family:'Bebas Neue',sans-serif;letter-spacing:.18em;border:none;cursor:pointer;transition:all .22s;font-size:.85rem;padding:.5rem 1.1rem;}
.btn-sm{font-size:.75rem;padding:.38rem .8rem;}
.btn-xs{font-size:.65rem;padding:.28rem .6rem;}
.btn-mg{background:var(--mg);color:var(--bg);}
.btn-mg:hover{background:var(--hot);}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#2ecc71;}
.btn-red{background:rgba(192,57,43,.2);color:#e74c3c;border:1px solid rgba(192,57,43,.3);}
.btn-red:hover{background:rgba(192,57,43,.35);}
.btn-ghost{background:none;color:var(--muted);border:1px solid var(--border);}
.btn-ghost:hover{color:var(--mg);border-color:var(--mg);}
.btn-amber{background:rgba(201,168,76,.2);color:var(--amber);border:1px solid rgba(201,168,76,.3);}
.btn-amber:hover{background:rgba(201,168,76,.35);}

/* FORMS */
.form-grid{display:grid;gap:1rem;}
.form-grid.g2{grid-template-columns:1fr 1fr;}
.form-grid.g3{grid-template-columns:1fr 1fr 1fr;}
.form-grid .span2{grid-column:span 2;}
.ff{display:flex;flex-direction:column;gap:.35rem;}
.ff label{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);}
.ff input,.ff select,.ff textarea{background:var(--card);border:1px solid var(--border);color:var(--txt);padding:.75rem .9rem;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;outline:none;transition:border-color .25s;resize:none;width:100%;}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--mg);}
.ff select option{background:var(--card);}

/* CHAT */
.chat-shell{display:grid;grid-template-columns:220px 1fr;height:520px;border:1px solid var(--border);}
.chat-list{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface);}
.chat-list-hd{padding:.7rem 1rem;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:.50rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;}
.chat-contact{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;cursor:pointer;transition:background .2s;border-left:2px solid transparent;}
.chat-contact:hover{background:var(--pglow);}
.chat-contact.on{background:var(--pglow);border-left-color:var(--mg);}
.chat-contact-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.75rem;flex-shrink:0;}
.chat-contact-name{font-size:.92rem;color:var(--txt);}
.chat-contact-preview{font-family:'Space Mono',monospace;font-size:.46rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px;}
.chat-contact-unread{margin-left:auto;background:var(--mg);color:var(--bg);border-radius:10px;font-family:'Space Mono',monospace;font-size:.42rem;padding:.1rem .38rem;flex-shrink:0;}
.chat-window{display:flex;flex-direction:column;background:var(--card);}
.chat-hd{padding:.8rem 1.1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.7rem;}
.chat-hd-name{font-size:1rem;font-weight:600;color:var(--txt);}
.chat-hd-status{font-family:'Space Mono',monospace;font-size:.44rem;color:var(--green);}
.chat-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.7rem;}
.msg{max-width:68%;display:flex;flex-direction:column;gap:.15rem;}
.msg.out{align-self:flex-end;align-items:flex-end;}
.msg.in{align-self:flex-start;}
.msg-b{padding:.6rem .9rem;font-size:.93rem;line-height:1.5;}
.msg.out .msg-b{background:var(--mg);color:var(--bg);}
.msg.in .msg-b{background:var(--hover);color:var(--txt);}
.msg-t{font-family:'Space Mono',monospace;font-size:.42rem;color:var(--muted);}
.chat-ft{border-top:1px solid var(--border);padding:.7rem;display:flex;gap:.6rem;}
.chat-input{flex:1;background:var(--hover);border:1px solid var(--border);color:var(--txt);padding:.6rem .9rem;font-family:'Barlow Condensed',sans-serif;font-size:.95rem;outline:none;transition:border-color .25s;}
.chat-input:focus{border-color:var(--mg);}
.chat-send{background:var(--mg);color:var(--bg);border:none;padding:.6rem 1.1rem;font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:.15em;cursor:pointer;transition:background .22s;}
.chat-send:hover{background:var(--hot);}

/* CALENDAR */
.cal-grid-wrap{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;margin-bottom:1.5rem;}
.cal{background:var(--card);border:1px solid var(--border);padding:1.1rem;}
.cal-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:.9rem;}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.1em;color:var(--txt);}
.cal-nav{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:.2rem .4rem;transition:color .2s;}
.cal-nav:hover{color:var(--mg);}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:.15rem;}
.cal-dow{font-family:'Space Mono',monospace;font-size:.44rem;color:var(--muted);text-align:center;padding:.25rem 0;}
.cal-day{font-size:.84rem;text-align:center;padding:.38rem .2rem;cursor:pointer;transition:all .2s;color:var(--muted);border-radius:2px;}
.cal-day:hover{background:var(--pglow);color:var(--txt);}
.cal-day.today{color:var(--mg);font-weight:700;}
.cal-day.sel{background:var(--mg);color:var(--bg);}
.cal-day.booked{border-bottom:2px solid var(--amber);}
.cal-day.empty{cursor:default;}

/* SLOTS */
.slots-panel{background:var(--card);border:1px solid var(--border);padding:1.1rem;}
.slots-title{font-family:'Space Mono',monospace;font-size:.54rem;letter-spacing:.2em;color:var(--muted);text-transform:uppercase;margin-bottom:.9rem;}
.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;}
.slot{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.1em;padding:.48rem;text-align:center;border:1px solid var(--border);cursor:pointer;transition:all .22s;color:var(--muted);background:none;}
.slot:hover{border-color:var(--mg);color:var(--mg);}
.slot.sel{background:var(--mg);color:var(--bg);border-color:var(--mg);}
.slot.taken{opacity:.3;cursor:not-allowed;text-decoration:line-through;}

/* PHOTOS */
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem;margin-bottom:1.5rem;}
.photo-card{background:var(--card);border:1px solid var(--border);overflow:hidden;}
.ba-pair{display:grid;grid-template-columns:1fr 2px 1fr;}
.ba-half{aspect-ratio:1;background:var(--hover);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.3rem;overflow:hidden;position:relative;}
.ba-lbl{font-family:'Space Mono',monospace;font-size:.44rem;letter-spacing:.12em;text-transform:uppercase;position:relative;z-index:1;}
.ba-lbl.before{color:var(--muted);}
.ba-lbl.after{color:var(--mg);}
.ba-ico{font-size:1.4rem;opacity:.2;position:relative;z-index:1;}
.ba-div{background:var(--mg);}
.photo-meta{padding:.8rem 1rem;border-top:1px solid var(--border);}
.photo-session{font-size:.93rem;font-weight:600;color:var(--txt);}
.photo-date{font-family:'Space Mono',monospace;font-size:.50rem;color:var(--muted);margin-top:.15rem;}
.photo-add{grid-column:1/-1;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;min-height:180px;cursor:pointer;transition:all .25s;background:none;}
.photo-add:hover{border-color:var(--mg);background:var(--pglow);}
.photo-add-inner{text-align:center;}
.photo-add-ico{font-size:1.8rem;opacity:.2;display:block;margin-bottom:.5rem;}
.photo-add-txt{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;}

/* UPLOAD */
.upload-zone{border:1.5px dashed var(--border);background:var(--card);padding:1.4rem;text-align:center;cursor:pointer;transition:all .25s;position:relative;}
.upload-zone:hover{border-color:var(--mg);background:var(--pglow);}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-zone-ico{font-size:1.6rem;opacity:.22;display:block;margin-bottom:.4rem;}
.upload-zone-txt{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;}
.upload-preview-wrap{position:relative;display:none;}
.upload-preview-wrap img{width:100%;max-height:90px;object-fit:cover;display:block;border:1px solid var(--mg);}

/* REFS */
.ref-strip{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
.ref-thumb{position:relative;width:65px;height:65px;flex-shrink:0;}
.ref-thumb img{width:100%;height:100%;object-fit:cover;border:1px solid var(--border);display:block;}
.ref-thumb-rm{position:absolute;top:-5px;right:-5px;background:var(--mg);color:var(--bg);border:none;border-radius:50%;width:15px;height:15px;cursor:pointer;font-size:.55rem;display:flex;align-items:center;justify-content:center;font-weight:bold;}
.ref-add{width:65px;height:65px;border:1px dashed var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:.2rem;transition:all .22s;position:relative;background:none;}
.ref-add:hover{border-color:var(--mg);}
.ref-add input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.ref-add-ico{font-size:1.1rem;opacity:.25;}
.ref-add-txt{font-family:'Space Mono',monospace;font-size:.38rem;color:var(--dim);text-transform:uppercase;}

/* BUDGET */
.budget-card{background:var(--card);border:1px solid var(--border);padding:1.3rem;margin-bottom:1rem;}
.budget-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1rem;}
.budget-ref{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.08em;color:var(--txt);}
.budget-date{font-family:'Space Mono',monospace;font-size:.50rem;color:var(--muted);margin-top:.2rem;}
.budget-row{display:flex;justify-content:space-between;padding:.45rem 0;border-bottom:1px solid rgba(46,42,42,.5);font-size:.92rem;}
.budget-row:last-child{border-bottom:none;}
.budget-total{display:flex;justify-content:space-between;padding:.65rem 0;border-top:2px solid var(--mg);font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;margin-top:.3rem;}
.budget-total-v{color:var(--mg);}
.budget-actions{display:flex;gap:.6rem;margin-top:1rem;}

/* CLIENT CARDS */
.client-list{display:flex;flex-direction:column;gap:.5rem;}
.client-card{background:var(--card);border:1px solid var(--border);padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;cursor:pointer;transition:border-color .22s;}
.client-card:hover{border-color:rgba(232,24,106,.4);}
.client-info{flex:1;}
.client-name{font-size:1rem;font-weight:600;color:var(--txt);}
.client-detail{font-family:'Space Mono',monospace;font-size:.50rem;color:var(--muted);margin-top:.2rem;}
.client-right{display:flex;align-items:center;gap:.6rem;flex-shrink:0;}

/* MISC */
.info-banner{background:var(--pglow);border:1px solid rgba(232,24,106,.2);padding:.9rem 1.1rem;font-family:'Space Mono',monospace;font-size:.54rem;letter-spacing:.1em;color:var(--muted);line-height:1.7;margin-bottom:1rem;}
.info-banner strong{color:var(--mg);}
.sec-div{display:flex;align-items:center;gap:.8rem;margin:1.2rem 0;}
.sec-div-txt{font-family:'Space Mono',monospace;font-size:.52rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.sec-div-line{flex:1;height:1px;background:var(--border);}

/* NOTIFICATION */

  if (u && u.pass === pass) { enterApp(u.role, u.name, email); }

  var name  = document.getElementById('r-name').value.trim();

  USERS[email] = { pass:pass, name:name, role:'client' };
  enterApp('client', name, email);
}

  State.role = role; State.user = { name:name, email:email };

  navigate(role==='admin' ? 'a-overview' : 'c-overview');

  var items = State.role==='admin' ? ADMIN_NAV : CLIENT_NAV;

    } else {
      var d = document.createElement('div'); d.className='nav-item'; d.id='nav-'+item.id;

      nav.appendChild(d);

  });

  var d      = who==='client' ? State.calDate : State.calAdminDate;
  var lbl    = document.getElementById(who==='client'?'cal-c-label':'cal-a-label');
  var grid   = document.getElementById(who==='client'?'cal-c-grid':'cal-a-grid');
  if (!lbl||!grid) return;
  lbl.textContent = MONTHS[d.getMonth()]+' '+d.getFullYear();
  grid.innerHTML = '';
  DOW.forEach(function(dw){ var e=document.createElement('div');e.className='cal-dow';e.textContent=dw;grid.appendChild(e); });
  var first  = new Date(d.getFullYear(),d.getMonth(),1).getDay();
  var total  = new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
  var booked = [18,21,25,26,28];
  for (var i=0;i<first;i++){ var e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e); }
  for (var i=1;i<=total;i++){
    var e=document.createElement('div');
    e.className='cal-day'+(i===20?' today':'')+(booked.indexOf(i)>=0?' booked':'');
    e.textContent=i;
    (function(day,el){
      el.onclick=function(){
        grid.querySelectorAll('.cal-day').forEach(function(x){x.classList.remove('sel');});
        el.classList.add('sel'); State.selectedDate=day;
        var l=document.getElementById('sel-date-lbl');
        if(l) l.textContent=day+' '+MONTHS[d.getMonth()]+' '+d.getFullYear();
      };
    })(i,e);
    grid.appendChild(e);
  }
}
function calNav(who,dir){ if(who==='client'){State.calDate.setMonth(State.calDate.getMonth()+dir);buildCal('client');}else{State.calAdminDate.setMonth(State.calAdminDate.getMonth()+dir);buildCal('admin');} }

// ── SLOTS ──
function pickSlot(btn,time){ document.querySelectorAll('.slot').forEach(function(s){s.classList.remove('sel');}); btn.classList.add('sel'); State.selectedSlot=time; }
function submitBooking(){ if(!State.selectedSlot){toast('Selecciona um horario.','Atencao');return;} toast('Pedido enviado! Diego confirmara em breve.'); setTimeout(function(){navigate('c-sessions');},600); }

// ── REFS ──
function addRefs(input){
  var strip=document.getElementById('ref-strip'),addBtn=document.getElementById('ref-add-btn');
  if(!strip) return;
  Array.from(input.files).slice(0,5).forEach(function(file){
    if(strip.querySelectorAll('.ref-thumb').length>=5) return;
    var r=new FileReader(); r.onload=function(e){ var w=document.createElement('div');w.className='ref-thumb';w.innerHTML='<img src="'+e.target.result+'"/><button class="ref-thumb-rm" onclick="this.parentElement.remove()">&#215;</button>';strip.insertBefore(w,addBtn); }; r.readAsDataURL(file);
  }); input.value='';
}

// ── PHOTO PREVIEW ──
function photoPreview(input,id){
  var file=input.files[0]; if(!file) return;
  var r=new FileReader(); r.onload=function(e){ var w=document.getElementById(id); if(!w)return; w.innerHTML='<img src="'+e.target.result+'"/>'; w.style.display='block'; }; r.readAsDataURL(file);
}

// ── CHAT ──
function sendMsg(who){
  var input=document.getElementById(who==='client'?'client-chat-in':'admin-chat-in');
  var msgs=document.getElementById(who==='client'?'client-msgs':'admin-msgs');
  if(!input||!msgs) return;
  var text=input.value.trim(); if(!text) return;
  var now=new Date(),time=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  var out=document.createElement('div'); out.className='msg out'; out.innerHTML='<div class="msg-b">'+text+'</div><div class="msg-t">Tu · '+time+'</div>';
  msgs.appendChild(out); msgs.scrollTop=msgs.scrollHeight; input.value='';
  setTimeout(function(){ var rep=document.createElement('div'); rep.className='msg in'; var w2=who==='client'?'Diego':State.chatUser; rep.innerHTML='<div class="msg-b">'+REPLIES[Math.floor(Math.random()*REPLIES.length)]+'</div><div class="msg-t">'+w2+' · '+time+'</div>'; msgs.appendChild(rep); msgs.scrollTop=msgs.scrollHeight; },1200);
}
function adminChat(name,av,color,el){
  State.chatUser=name;
  document.querySelectorAll('.chat-contact').forEach(function(c){c.classList.remove('on');}); el.classList.add('on');
  var avEl=document.getElementById('admin-chat-av'),nameEl=document.getElementById('admin-chat-name'),msgs=document.getElementById('admin-msgs');
  if(avEl){avEl.textContent=av;avEl.style.background=color;} if(nameEl) nameEl.textContent=name;
  if(msgs) msgs.innerHTML='<div class="msg in"><div class="msg-b">Ola Diego! Tenho uma duvida.</div><div class="msg-t">'+name+' · 09:15</div></div><div class="msg out"><div class="msg-b">Claro! Diz o que precisas.</div><div class="msg-t">Tu · 09:17</div></div>';
}

// ── MODALS ──
function saveSession(){ closeModalId('modal-session'); toast('Sessao guardada!'); }
function addBudgetRow(){
  var list=document.getElementById('budget-items'); if(!list) return;
  var row=document.createElement('div'); row.style.cssText='display:grid;grid-template-columns:1fr 110px 30px;gap:.5rem;margin-bottom:.5rem;';
  row.innerHTML='<input style="background:var(--card);border:1px solid var(--border);color:var(--txt);padding:.6rem .8rem;font-size:.92rem;outline:none;" placeholder="Descricao"/><input type="number" style="background:var(--card);border:1px solid var(--border);color:var(--txt);padding:.6rem .8rem;font-size:.92rem;outline:none;" placeholder="R$"/><button class="btn btn-ghost btn-xs" onclick="this.parentElement.remove()" style="padding:.3rem;">&#215;</button>';
  list.appendChild(row);
}
function cancelSess(id){ if(confirm('Cancelar esta sessao?')) toast('Sessao cancelada.'); }
function openModalId(id){ document.getElementById(id).classList.add('open'); }
function closeModalId(id){ document.getElementById(id).classList.remove('open'); }
function closeModal(e,id){ if(e.target.id===id) closeModalId(id); }

// ── TOAST ──
var toastTimer=null;
function toast(msg,title){
  title=title||'VERMESET';
  document.getElementById('notif-title').textContent=title;
  document.getElementById('notif-msg').textContent=msg;
  var n=document.getElementById('notif');
  n.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(function(){n.classList.remove('show');},3500);
}
</script>
</body>
</html>
